# https://github.com/vvuk/eddy-ng/wiki/BTT-Eddy
# https://github.com/vvuk/eddy-ng

[constants]
x_probe_offset: 35
y_probe_offset: 0
x_home_pos: 82.5
y_home_pos: 117.5
z_horizontal_move: 2
z_tap_adjust: -0.040
eddy_serial: /dev/serial/by-id/usb-Klipper_rp2040_xxxxxxx-if00

[mcu eddy]
is_non_critical: true
serial: ${constants.eddy_serial}
restart_method: command 

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: ${constants.x_probe_offset}
y_offset: ${constants.y_probe_offset}
tap_adjust_z: ${constants.z_tap_adjust}
tap_samples: 3
tap_max_samples: 5

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 0
max_temp: ${constants.bed_max_temp}

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[bed_mesh]
mesh_min: 32, 15
mesh_max: 200, 202.5 # 200, 225
probe_count: 64, 64

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BTT_BED_MESH_CALIBRATE
gcode: EDDYNG_BED_MESH_EXPERIMENTAL # BTT_BED_MESH_CALIBRATE METHOD=rapid_scan
