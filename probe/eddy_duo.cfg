# https://github.com/vvuk/eddy-ng/wiki/BTT-Eddy
# https://github.com/vvuk/eddy-ng

[constants]
x_offset: 35
x_home_pos: 82.5
z_horizontal_move: 2.5
z_tap_adjust: -0.040

[mcu eddy]
is_non_critical: false
serial: /dev/serial/by-id/usb-Klipper_rp2040_504450610870791C-if00
restart_method: command 

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: ${constants.x_offset}
y_offset: ${constants.y_offset}
tap_adjust_z: ${constants.z_tap_adjust}

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 0
max_temp: ${constants.bed_max_temp}

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[bed_mesh]
mesh_min: 30, 15
mesh_max: 225, 200
probe_count: 9, 9
speed: ${constants.homing_speed}

[z_tilt]
horizontal_move_z: 10.0
min_horizontal_move_z: ${constants.z_horizontal_move}
adaptive_horizontal_move_z: true

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BTT_BED_MESH_CALIBRATE
gcode: EDDYNG_BED_MESH_EXPERIMENTAL
#gcode: BTT_BED_MESH_CALIBRATE METHOD=rapid_scan
