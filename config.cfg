# https://ellis3dp.com/Print-Tuning-Guide
# https://github.com/rootiest/zippy_guides

# todo run input shaper, get it to ender 3 s1 pro speeds

[constants]
home_path: /home/biqu
homing_speed: 50 # 60
travel_speed: 200
microsteps: 64 # 32
interpolate: true
max_velocity: 300
stall_frequency: 100
sense_resistor: 0.110
run_current: 0.700

x_rot_dist: 40
x_min_pos: -5
x_max_pos: 260 #-5..[0..225..235]..250..300
x_probe_offset: 30
x_home_pos: 87.5  # = (117.5: bed_mid) + (-30 : x_probe_offset)

y_rot_dist: 40
y_min_pos: -26
y_max_pos: 235 # -26..[0..205..225..235]..261
y_probe_offset: 0
y_home_pos: 117.5 # = (117.5: bed_mid) + (0 : y_probe_offset)

z_rot_dist: 8
z_min_pos: -1
z_max_pos: 200
z_max_velocity: 5
z_max_accel: 100
z_max_speed: 30
z_hop_dist: 5

e_min_temp: 180
e_max_temp: 300
e_fan_speed: 0.75 #0.60
e_max_only_velocity: 130
e_max_only_accel: 3000
e_max_only_dist: 1000
e_max_cross_section: 6
e_rot_dist: 25.574

bed_max_temp: 90
bed_mid: 117.5
screw_near: 32.5 # = (0 : bed_min) + (32.5 : first screw)
screw_far: 202.5 # = (0 : bed_min) + (32.5 : first screw) + (170 : middle_chunk) = screw_far 

[display_status]

[pause_resume]

[gcode_arcs]
resolution: 0.1

[virtual_sdcard]
path: ${constants.home_path}/printer_data/gcodes

[save_variables]
filename: ${constants.home_path}/variables.cfg

[idle_timeout]
timeout: 86400

[printer]
kinematics: cartesian
max_accel: ${constants.max_accel}
max_z_accel: ${constants.z_max_accel}
max_velocity: ${constants.max_velocity}
max_z_velocity: ${constants.z_max_velocity}

# MCU ------------------------------------------------------------------
[mcu]
serial: ${constants.main_mcu_path}
restart_method: command

[temperature_sensor MCU_TEMP]
sensor_type: temperature_mcu
min_temp: 0
max_temp: ${constants.bed_max_temp}

# PI_MCU ------------------------------------------------------------------
[mcu RPI_MCU]
serial: /tmp/klipper_host_mcu

[temperature_sensor PI_TEMP]
sensor_type: temperature_host
min_temp: 0
max_temp: ${constants.bed_max_temp}

# FAN ------------------------------------------------------------------

[fan] # part cooling 
min_power: 0.0

[heater_fan hotend_fan]
heater: extruder
fan_speed: ${constants.e_fan_speed}

[heater_fan enclosure_fan]
heater: extruder

# SENSOR ------------------------------------------------------------------
[filament_switch_sensor sp_sensor_runout]
pause_on_runout: False
event_delay: 0.5
pause_delay: 1.0
runout_gcode: PAUSE
insert_gcode: RESUME

# X ------------------------------------------------------------------
[stepper_x]
endstop_pin: tmc2209_stepper_x:virtual_endstop
microsteps: ${constants.microsteps}
homing_speed: ${constants.homing_speed}
homing_retract_dist: 0
rotation_distance: ${constants.x_rot_dist}
position_endstop: ${constants.x_min_pos}
position_min: ${constants.x_min_pos}
position_max: ${constants.x_max_pos}

[tmc2209 stepper_x]
interpolate: ${constants.interpolate}
run_current: ${constants.run_current}
sense_resistor: ${constants.sense_resistor}

[autotune_tmc stepper_x]
motor: creality-42-34
tuning_goal: silent
sg4_thrs: ${constants.stall_frequency}

# Y ------------------------------------------------------------------
[stepper_y]
endstop_pin: tmc2209_stepper_y:virtual_endstop
microsteps: ${constants.microsteps}
homing_speed: ${constants.homing_speed}
homing_retract_dist: 0
rotation_distance: ${constants.y_rot_dist}
position_endstop: ${constants.y_min_pos}
position_min: ${constants.y_min_pos}
position_max: ${constants.y_max_pos}

[tmc2209 stepper_y]
interpolate: ${constants.interpolate}
run_current: ${constants.run_current}
sense_resistor: ${constants.sense_resistor}

[autotune_tmc stepper_y]
motor: creality-42-34
tuning_goal: silent
sg4_thrs: ${constants.stall_frequency}

# Z ------------------------------------------------------------------
[stepper_z]
endstop_pin: probe:z_virtual_endstop
microsteps: ${constants.microsteps}
rotation_distance: ${constants.z_rot_dist}
position_min: ${constants.z_min_pos}
position_max: ${constants.z_max_pos}
homing_speed: ${constants.z_max_speed}

[tmc2209 stepper_z]
interpolate: ${constants.interpolate}
run_current: ${constants.run_current}
sense_resistor: ${constants.sense_resistor}

[autotune_tmc stepper_z]
motor: creality-42-34
tuning_goal: silent

# Z1 ------------------------------------------------------------------
[stepper_z1]
microsteps: ${constants.microsteps}
rotation_distance: ${constants.z_rot_dist}

[tmc2209 stepper_z1]
interpolate: ${constants.interpolate}
run_current: ${constants.run_current}
sense_resistor: ${constants.sense_resistor}

[autotune_tmc stepper_z1]
motor: creality-42-34
tuning_goal: silent

# E ------------------------------------------------------------------
[extruder]
sensor_type: EPCOS 100K B57560G104F
microsteps: ${constants.microsteps}
nozzle_diameter: ${constants.e_nozzle_diameter}
rotation_distance: ${constants.e_rot_dist}
min_extrude_temp: ${constants.e_min_temp}
min_temp: 0
max_temp: ${constants.e_max_temp}
pressure_advance: ${constants.pressure_advance}
max_extrude_only_accel: ${constants.e_max_only_accel}
max_extrude_only_distance: ${constants.e_max_only_dist}
max_extrude_only_velocity: ${constants.e_max_only_velocity}
max_extrude_cross_section: ${constants.e_max_cross_section}
gear_ratio: 3.5:1 #42:12
control: pid

[tmc2209 extruder]
interpolate: ${constants.interpolate}
run_current: ${constants.run_current}
sense_resistor: ${constants.sense_resistor}

[autotune_tmc extruder]
motor: BJ42D09-20V02
tuning_goal: silent

# BED ------------------------------------------------------------------

[heater_bed]
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: ${constants.bed_max_temp}
control: pid

# CALIBRATE ------------------------------------------------------------------

[safe_z_home]
speed: ${constants.travel_speed}
z_hop_speed: ${constants.z_max_speed}
z_hop: ${constants.z_hop_dist}
home_xy_position: ${constants.x_home_pos}, ${constants.y_home_pos}
home_y_before_x: true

[screws_tilt_adjust]
speed: ${constants.travel_speed}
horizontal_move_z: ${constants.z_horizontal_move}
use_probe_xy_offsets: true
screw1_name: Back Left
screw2_name: Front Left
screw3_name: Front Right
screw4_name: Back Right
screw1: ${constants.screw_near}, ${constants.screw_far}
screw2: ${constants.screw_near}, ${constants.screw_near}
screw3: ${constants.screw_far}, ${constants.screw_near}
screw4: ${constants.screw_far}, ${constants.screw_far}

[z_tilt]
speed: ${constants.travel_speed}
horizontal_move_z: ${constants.z_horizontal_move}
use_probe_xy_offsets: true
adaptive_horizontal_move_z: true
z_positions:
    ${constants.screw_near}, ${constants.bed_mid}
    ${constants.screw_far}, ${constants.bed_mid}
points:
    ${constants.screw_near}, ${constants.screw_far}
    ${constants.screw_near}, ${constants.screw_near}
    ${constants.screw_far}, ${constants.screw_near}
    ${constants.screw_far}, ${constants.screw_far}

[bed_mesh]
speed: ${constants.travel_speed}
horizontal_move_z: ${constants.z_horizontal_move}
use_probe_xy_offsets: false
algorithm: bicubic
adaptive_margin: 5

[input_shaper]
shaper_type_x: ei
shaper_freq_x: 47.6
shaper_type_y: mzv
shaper_freq_y: 31.4