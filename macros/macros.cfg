[gcode_macro _MACRO_VARS]
variable_travel_speed: 200.0        ; Fallback default
variable_z_hop_dist: 5.0            ; Fallback default
variable_z_hop_feedrate: 600.0      ; Fallback default
variable_center_x: 117.5            ; Fallback default
variable_center_y: 117.5            ; Fallback default
variable_wipe_center_x: 237.5
variable_purge_bucket_x: 250.0
gcode: G4 P10 
description: Centralized state configuration registry for variable scoping

[delayed_gcode INIT_MACRO_VARIABLES]
initial_duration: 1
gcode:
    {action_respond_info("<*> INIT: Fetching dynamic Kalico constants for macro vars")}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARS VARIABLE=travel_speed VALUE={constants.travel_speed|float}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARS VARIABLE=z_hop_dist VALUE={constants.z_hop_dist|float}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARS VARIABLE=z_hop_feedrate VALUE={(constants.z_max_speed|float) * 60.0}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARS VARIABLE=center_x VALUE={constants.bed_mid|float}
    SET_GCODE_VARIABLE MACRO=_MACRO_VARS VARIABLE=center_y VALUE={constants.bed_mid|float}
    WLED_ON STRIP=chamber PRESET=1 # WLED Idle Preset
description: initalize the variables

# -------------------------------------------------------------------------------------------
# START_PRINT
# -------------------------------------------------------------------------------------------
[gcode_macro START_PRINT]
gcode:
    {% set bed_temp = params.BED_TEMP|default(0)|float %}
    {% set e_temp = params.EXTRUDER_TEMP|default(0)|float %}
    {% set filament_type = params.FILAMENT_TYPE|default('')|string|upper %}
    {% set z_tap_adjust = printer['probe'].tap_adjust_z|float %}
    {% set filament_offset = {"PLA": 0.0,"PETG": 0.0,"TPU": 0.0}.get(filament_type, 0.0)|float %}

    G90 ; Absolute positioning
    EXCLUDE_OBJECT_DEFINE
    SET_FILAMENT_SENSOR_ON
    {action_respond_info("<*> START_PRINT: Bed=%.1f, Extruder=%.1f, Z_TAP=%.3f, Offset=%+.3f, Filament=%s" % (bed_temp, e_temp, z_tap_adjust, filament_offset, filament_type))}
    PROBE_EDDY_NG_SET_TAP_ADJUST_Z VALUE={(z_tap_adjust + filament_offset)|float}

    WLED_ON STRIP=chamber PRESET=2 # WLED Heating Preset
    M104 S{e_temp-60}
    M190 S{bed_temp}

    AUTO_Z_TILT
    NOZZLE_WIPE

    UTIL_CENTER_TOOLHEAD
    UTIL_FRAME_SETTLE
    PROBE_EDDY_NG_TAP
    BED_MESH_CALIBRATE

    M109 S{e_temp}
    AUTO_PURGE
    UTIL_CENTER_TOOLHEAD
    WLED_ON STRIP=chamber PRESET=3 # WLED Printing Preset

description: Start print sequence with dual-stage wiping and purging

# -------------------------------------------------------------------------------------------
# END_PRINT
# -------------------------------------------------------------------------------------------
[gcode_macro END_PRINT]
gcode:
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set macro_travel = (vars.travel_speed|float) * 60 %}
    {% set x_min = printer.toolhead.axis_minimum.x|int %}     
    {% set y_max = printer.toolhead.axis_maximum.y|int %}
    {action_respond_info("<*> Calling END_PRINT with TRAVEL_SPEED=%.1f, X_MIN=%d, Y_MAX=%d" % (macro_travel/60, x_min, y_max))}

    AUTO_RETRACT_TIP
    AUTO_LIFT_Z
    G90
    G1 X{x_min} Y{y_max - 15} F{macro_travel} ; Park with 5mm buffer from max Y boundary

    TURN_OFF_HEATERS
    M84 ; disable motors
    M107 ; turn off fan
    TURN_OFF_ACCESORIES
    WLED_ON STRIP=chamber PRESET=8 # WLED Complete Preset
    
    PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=0
    BED_MESH_CLEAR
    UPDATE_DELAYED_GCODE ID=CLEAR_FILE DURATION=1
description: End a print, turn off heaters, and park the toolhead

# -------------------------------------------------------------------------------------------
# CANCEL_PRINT
# -------------------------------------------------------------------------------------------
[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    {action_respond_info("<*> Calling CANCEL_PRINT")}
    CLEAR_PAUSE
    END_PRINT
    WLED_ON STRIP=chamber PRESET=5 # WLED Cancel Preset
    BASE_CANCEL_PRINT
description: Cancel a print, turn off heaters, and park the toolhead

# -------------------------------------------------------------------------------------------
# PAUSE
# -------------------------------------------------------------------------------------------
[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # Parameters
    {% set x_max = printer.toolhead.axis_maximum.x|int %}                                        
    {% set y_min = printer.toolhead.axis_minimum.y|int %}            
    {% set e_temp = printer['extruder'].target|int %}    
    {% set paused_status = printer['pause_resume'].is_paused|int %}
    
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set z_hop = vars.z_hop_dist|float %}
    {% set macro_travel = (vars.travel_speed|float) * 60 %}

    {% if paused_status == 0 %}
        WLED_ON STRIP=chamber PRESET=4 # WLED Pause Preset

        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z_hop}   ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={e_temp} ; set hotend temp variable for reference in resume macro                           

        TURN_OFF_ACCESORIES
        
        SAVE_GCODE_STATE NAME=PAUSE                                   ; save current print position for resume
        BASE_PAUSE      

        AUTO_RETRACT_TIP
        AUTO_LIFT_Z
        G90
        G1 X{x_max/2} Y{y_min+5} F{macro_travel}                      ; park toolhead at front center
        SAVE_GCODE_STATE NAME=PAUSEPARK                               ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error)
        M104 S0                                                       ; turn off hotend
    {% endif %}
description: Pause a print, optionally raising Z and parking the toolhead

# -------------------------------------------------------------------------------------------
# RESUME
# -------------------------------------------------------------------------------------------
[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
    # Parameters
    {% set e = params.E|default(2.5)|int %}                         ; hotend prime amount (in mm)
    {% set paused_status = printer['pause_resume'].is_paused|int %}
    
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set z_force = vars.z_hop_feedrate|int %}
    {action_respond_info("<*> Calling RESUME")}

    {% set zhop = printer['gcode_macro RESUME'].zhop|int %}
    {% set etemp = printer['gcode_macro RESUME'].etemp|int %}

    {% if paused_status == 0 %}{action_respond_info("<*> Print is not paused. No action taken.")}{% endif %}

    {% if paused_status == 1 %}
        {% if zhop == 0 %}{action_respond_info("<*> Z hop is 0. No action taken.")}{% endif %}
        {% if zhop > 0 %}{action_respond_info("<*> Resuming print with Z hop of %.1f" % (zhop))}{% endif %}
        {% if etemp > 0 %}{action_respond_info("<*> Resuming print with hotend temp of %.1f" % (etemp))}{% endif %}
        WLED_ON STRIP=chamber PRESET=6 # WLED Resume Preset
        TURN_ON_ACCESORIES

        {% if etemp > 0 %} M109 S{etemp|int} {% endif %}            ; wait for hotend to heat back up
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=200    ; go back to parked position in case toolhead was moved during pause (otherwise the return zhop can error)
        G91                                                         ; relative positioning
        M83                                                         ; relative extruder positioning
        G1 Z{zhop * -1} F{z_force}                                  ; lower Z back down without priming (just in case we are testing the macro with cold hotend)
        AUTO_PURGE
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=200        ; restore position
        WLED_ON STRIP=chamber PRESET=3 # WLED Printing Preset
        BASE_RESUME                                                 ; resume print
    {% endif %}
description: Resume a print after a pause, optionally restoring position & temperatures

# -------------------------------------------------------------------------------------------
# M109
# -------------------------------------------------------------------------------------------
[gcode_macro M109]
rename_existing: M99109
gcode:
    {% set s = params.S|default(0)|float %}
    {action_respond_info("<*> Heating Extruder to: %.1f" % (s))}
    M104 {% for p in params %}{p}{params[p]} {% endfor %}  ; Set hotend temp using safe token evaluation
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} ; Wait for hotend temp
    {% endif %}
description: Heat the extruder to a specified temperature and wait until it reaches that temperature

# -------------------------------------------------------------------------------------------
# M190
# -------------------------------------------------------------------------------------------
[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set s = params.S|default(0)|float %}
    {action_respond_info("<*> Heating Bed to: %.1f" % (s))}
    M140 {% for p in params %}{p}{params[p]} {% endfor %}   ; Set bed temp using safe token evaluation
    {% if s != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} ; Wait for bed temp (within 2 degree)
    {% endif %}
description: Heat the bed to a specified temperature and wait until it reaches that temperature

# -------------------------------------------------------------------------------------------
# CLEAR_FILE
# -------------------------------------------------------------------------------------------
[delayed_gcode CLEAR_FILE]
gcode: SDCARD_RESET_FILE
description: clear sd file after print

# -------------------------------------------------------------------------------------------
# FILAMENT
# -------------------------------------------------------------------------------------------
[delayed_gcode DISABLE_FILAMENT_SENSOR_ON_STARTUP]
initial_duration: 1
gcode: SET_FILAMENT_SENSOR_OFF
description: Disable filament sensor on startup

[gcode_macro SET_FILAMENT_SENSOR_OFF]
gcode: SET_FILAMENT_SENSOR SENSOR=sp_sensor_runout ENABLE=0
description: Disable filament sensor

[gcode_macro SET_FILAMENT_SENSOR_ON]
gcode: SET_FILAMENT_SENSOR SENSOR=sp_sensor_runout ENABLE=1
description: Enable filament sensor

[gcode_macro M600]
gcode: PAUSE
description: Filament change

# -------------------------------------------------------------------------------------------
# MMU
# -------------------------------------------------------------------------------------------

[gcode_macro _SP_PRINT_START]
gcode: {action_respond_info("<*> Calling _SP_PRINT_START")}
description: default no-op override

[gcode_macro _SP_PRINT_END]
gcode: {action_respond_info("<*> Calling _SP_PRINT_END")}
description: default no-op override

[gcode_macro _SP_SET_PURGE]
gcode: {action_respond_info("<*> Calling _SP_SET_PURGE")}
description: default no-op override

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# AUTO FUNCTIONS
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[gcode_macro AUTO_LIFT_Z]
gcode:
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set z_hop = vars.z_hop_dist|float %} 
    {% set z_feedrate = vars.z_hop_feedrate|float %}
    {% set z_max = printer.toolhead.axis_maximum.z %}     ; maximum Z height
    {% set req = printer.gcode_move.position.z + z_hop %} ; calculate requested Z height after hop

    G91 ; relative positioning                                                               
    {% if req >= z_max %} ; if z max is exceeded, show message and set zhop value for resume to 0
        { action_respond_info("Pause zhop exceeds maximum Z height.") }                  
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
    {% else %}
         G1 Z{z_hop} F{z_feedrate}  ; raise Z up by z hop amount using Kalico constants                  
    {% endif %}
    G90 ; absolute positioning                                                            
description: Raise Z by a specified amount, ensuring it does not exceed the maximum Z height

[gcode_macro AUTO_CALIBRATE]
gcode:
    {action_respond_info("<*> Calling AUTO_CALIBRATE")}
    {% set bed_temp = params.BED_TEMP|default(65)|int %}
    M84
    M190 S{bed_temp}
    AUTO_Z_TILT
    #AUTO_X_TWIST
    #AUTO_Y_TWIST
    SCREWS_TILT_CALCULATE
description: Auto calibrate the bed mesh and screws tilt

[gcode_macro AUTO_Z_TILT]
gcode:
    {action_respond_info("<*> Calling AUTO_Z_TILT")}
    G28
    Z_TILT_ADJUST
    G28 Z
description: Home and adjust Z-tilt

[gcode_macro AUTO_TAP_CHECK]
gcode:
    {% set bed_temp = params.BED_TEMP|default(65)|int %}
    {% set tap_adjust = params.TAP_ADJUST|default(printer['probe'].tap_adjust_z)|float %}
    M190 S{bed_temp}
    AUTO_Z_TILT
    UTIL_CENTER_TOOLHEAD
    UTIL_FRAME_SETTLE
    PROBE_EDDY_NG_SET_TAP_ADJUST_Z VALUE={tap_adjust}
    PROBE_EDDY_NG_TAP

[gcode_macro AUTO_EDDY_CALIBRATE]
gcode: 
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set macro_travel = (vars.travel_speed|float) * 60 %}
    {action_respond_info("<*> Calling AUTO_EDDY_CALIBRATE")}

    G28 X Y
    G1 X{vars.center_x} Y{vars.center_y} F{macro_travel}

    {% for i in range(5) %} 
    PROBE_EDDY_NG_STATUS
    {% endfor %}

    M190 S65 ; heat bed to 65C for calibration

    PROBE_EDDY_NG_SETUP
description: Calibrate the EDDY probe and setup for bed mesh calibration

[gcode_macro AUTO_PID_EXTRUDER]
gcode: 
    {% set req = params.TEMP|float %}
    {action_respond_info("<*> Calibrating Extruder PID for: %.1f" % (req))}
    PID_CALIBRATE HEATER=extruder TARGET={req}
description: Calibrate the PID for the extruder heater to a specified temperature

[gcode_macro AUTO_PID_BED]
gcode: 
    {% set req = params.TEMP|float %}
    {action_respond_info("<*> Calibrating Bed PID for: %.1f" % (req))}
    PID_CALIBRATE HEATER=heater_bed TARGET={req}
description: Calibrate the PID for the bed heater to a specified temperature

[gcode_macro AUTO_RETRACT_TIP]
gcode:
    {action_respond_info("<*> Calling AUTO_RETRACT_TIP")}
    {% if printer.extruder.can_extrude %}
        G91 ; relative positioning                                                               
        G1 E-6 F900 ; Retract the tip of the extruder by 6mm
        G90 ; absolute positioning                                                            
    {% else %}
        {action_respond_info("<*> Extruder too cold to retract tip safely. Skipped.")}
    {% endif %}
description: Retract the tip of the extruder by 6mm

[gcode_macro NOZZLE_WIPE]
gcode:
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set macro_travel = (vars.travel_speed|float) * 60 %}
    {action_respond_info("<*> Wiping nozzle at X=%.1f" % (vars.wipe_center_x))}
    
    SAVE_GCODE_STATE NAME=nozzle_wipe_state
    G90
    G1 X{vars.wipe_center_x} F{macro_travel}
    {% set half_width = 2.5|float %}
    {% for i in range(5) %}
        G1 X{vars.wipe_center_x - half_width} F4800
        G1 X{vars.wipe_center_x + half_width} F4800
    {% endfor %}
    RESTORE_GCODE_STATE NAME=nozzle_wipe_state MOVE=1
description: Wipe the nozzle by moving it back and forth over a specified area

[gcode_macro AUTO_PURGE]
gcode:
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set macro_travel = (vars.travel_speed|float) * 60 %}
    {action_respond_info("<*> Purging into bucket at X=%.1f" % (vars.purge_bucket_x))}

    SAVE_GCODE_STATE NAME=purge_bucket_state
    G90
    G1 X{vars.purge_bucket_x} F{macro_travel}
    
    {% if printer.extruder.can_extrude %}
        SAVE_GCODE_STATE NAME=purge_extruder_state  ; Captures the extrusion state mode (M82/M83) before purging
        UTIL_RESET_EXTRUDER                         ; Forces relative tracking mode via M83
        G1 E36 F150
        G4 S2 ; wait for 2 seconds
        G1 E-0.75 F2100
        RESTORE_GCODE_STATE NAME=purge_extruder_state ; Reverts extruder mode back safely to whatever the printer or slicer was running
    {% else %}
        {action_respond_info("<*> Extruder too cold to purge safely. Skipped.")}
    {% endif %}
    
    RESTORE_GCODE_STATE NAME=purge_bucket_state
    NOZZLE_WIPE
description: Purge into bucket with thermal delay and wipe


# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# WLED (ENCLOSURE STRIP)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~================~~~~~~~

[gcode_macro WLED_ON]
gcode:
  {% set strip = params.STRIP|string %}
  {% set preset = params.PRESET|default(-1)|int %}
  {% set preset_name = {1:"Idle",2:"Heating",3:"Printing",4:"Pause",5:"Cancel",6:"Resume",7:"Homing",8:"Complete"}.get(preset, "NA")|string %}
  {action_respond_info("<*> Calling WLED_ON STRIP=%s PRESET=%i %s" % (strip,preset,preset_name))}
  {action_call_remote_method("set_wled_state",strip=strip,state=True,preset=preset)}
description: Turn WLED strip on using optional preset and resets led colors

[gcode_macro WLED_OFF]
gcode:
  {% set strip = params.STRIP|string %}
  {action_respond_info("<*> Calling WLED_ON STRIP=%s" % (strip))}
  {action_call_remote_method("set_wled_state",strip=strip,state=False)}
description: Turn WLED strip off

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# UTILS
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~================~~~~~~~

[gcode_macro TURN_OFF_ACCESORIES]
gcode:
    {action_respond_info("<*> Calling TURN_OFF_ACCESORIES")}
    SET_FILAMENT_SENSOR_OFF
description: Turn off accessories like LED and filament sensor

[gcode_macro TURN_ON_ACCESORIES]
gcode:
    {action_respond_info("<*> Calling TURN_ON_ACCESORIES")}
    SET_FILAMENT_SENSOR_ON
description: Turn on accessories like LED and filament sensor

[gcode_macro DUMP_VARIABLES]
gcode:
    {% set filter_name = params.NAME|default('')|string|lower %}
    {% set filter_value = params.VALUE|default('')|string|lower %}
    {% set show_cfg = params.SHOW_CFG|default(0)|int %}
    
    {% set out = [] %}

    {% for key1 in printer %}
        {% for key2 in printer[key1] %}
            {% if (show_cfg or not (key1|lower == 'configfile' and key2|lower in ['config', 'settings'])) and (filter_name in key1|lower or filter_name in key2|lower) and filter_value in printer[key1][key2]|string|lower %}
                {% set dummy = out.append("printer['%s'].%s = %s" % (key1, key2, printer[key1][key2])) %}
            {% endif %}
        {% else %}
            {% if filter_name in key1|lower and filter_value in printer[key1]|string|lower %}
                {% set dummy = out.append("printer['%s'] = %s" % (key1, printer[key1])) %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    
    {action_respond_info(out|join("\n"))}
description: Dump all printer variables, optionally filtered by name and value, and optionally including config variables

[gcode_macro UTIL_RESET_EXTRUDER]
gcode:
    M83          ; Set extruder to relative mode (highly recommended for Klipper)
    G92 E0       ; Reset extruder position to 0
description: reset extruder position

[gcode_macro UTIL_CENTER_TOOLHEAD]
gcode: 
    {% set vars = printer["gcode_macro _MACRO_VARS"] %}
    {% set macro_travel = (vars.travel_speed|float) * 60 %}
    G90 ; Force absolute coordinate mapping
    G0 X{vars.center_x} Y{vars.center_y} F{macro_travel}
description: move toolhead to center

[gcode_macro UTIL_FRAME_SETTLE]
gcode:
    G90
    G0 Z10 F600            ; Move up away from the bed
    G0 Z3 F600             ; Move back down to clear backlash/stiction
    G4 P3000               ; Let the frame and motors rest for 3 seconds
description: wait for frame settle

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# REF
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~================~~~~~~~

# =========================================================================================
# MACRO FEEDRATE & SPEED CATEGORIES REFERENCE
# =========================================================================================
# This file utilizes standardized feedrates (F values in mm/min) across all macros.
# Global XY travel scales dynamically based on values set inside [gcode_macro _MACRO_VARS]
#
# 1. GLOBAL FAST TRAVEL (XY Rapids)
#    - Dynamic Feedrate : F12000 (Calculated via: travel_speed * 60 -> 200 * 60)
#    - Used for         : Toolhead parking, pause positioning, rapid center moves, 
#                         and travel to the wipe/purge stations.
#
# 2. NOZZLE WIPING SPEED
#    - Static Feedrate  : F4800 (80 mm/s)
#    - Used for         : The short, rapid back-and-forth scrubbing strokes over the brush.
#
# 3. EXTRUSION & PURGING SPEEDS
#    - Purge Feedrate   : F150  (Slow volumetric push to safely clear the nozzle melt zone)
#    - Retract Feedrate : F900  (Standard tip retraction speed)
#    - Un-retract Speed : F2100 (Snappy move to minimize oozing/stringing post-purge)
#
# 4. Z-AXIS HOP SPEEDS
#    - Dynamic Feedrate : Inherited from Kalico [constants] z_max_speed * 60
#    - Used for         : Safe Z hops during PAUSE, RESUME, and AUTO_LIFT_Z sequences.
# =========================================================================================
